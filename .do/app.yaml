name: tenda-dodaqui
region: fra

services:
  - name: web
    dockerfile_path: backend/Dockerfile
    source_dir: /
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: DB_DATABASE
        value: ${db.DATABASE}
      - key: DB_USERNAME
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}

databases:
  - name: db
    engine: MYSQL
    version: "8"
    production: false
